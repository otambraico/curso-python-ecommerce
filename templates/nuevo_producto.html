<!DOCTYPE html>
<html>
<head>
    <title>Agregar Producto</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        form { background: #eee; padding: 20px; border-radius: 5px; max-width: 300px; }
        input { display: block; margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>
    <h1>Añadir Nuevo Producto</h1>
    <form method="POST">
        <input type="text" name="nombre" placeholder="Nombre del producto" required>
        <input type="number" name="precio" placeholder="Precio" step="0.01" required min="0">
        <input type="number" name="stock" placeholder="Stock inicial" required min="0">
        <button type="submit">Guardar Producto</button>
    </form>
    <br>
    <a href="/productos">Volver al catálogo</a>
</body>
</html>
